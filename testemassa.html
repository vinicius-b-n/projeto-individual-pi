<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input type="text" id="usuario" placeholder="Usuário"><br><br>
<input type="password" id="senha" placeholder="Senha"><br><br>

<button onclick="login()">Entrar</button>

<p id="mensagem"></p>

<script>
  let tentativas = 0;

  function login() {
    const user = document.getElementById("usuario").value;
    const pass = document.getElementById("senha").value;

    const usuarioCorreto = "admin";
    const senhaCorreta = "123";

    tentativas++;

    if (user === usuarioCorreto && pass === senhaCorreta) {
      document.getElementById("mensagem").innerText = "Login realizado!";
    } else {
      document.getElementById("mensagem").innerText = 
        "Erro! Tentativa " + tentativas;

      if (tentativas >= 3) {
        document.getElementById("mensagem").innerText = 
          "Bloqueado após 3 tentativas!";
      }
    }
  }
</script>

</body>
</html>
